name: Unit test

on:
  push:
    branches:
      - master
      - release-*
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.julia-version }}-${{ matrix.julia-arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # tier 1: ubuntu-[x86|x64], windows-[x86|x64], macos-[x64|aarch64]
        # tier 2: ubuntu-arm-[aarch64]
        julia-version: ['lts', '1', 'nightly']
        os: [ubuntu-latest, windows-latest, macos-15-intel]
        julia-arch: [x64]
        include:
          - os: ubuntu-latest # only test one 32-bit job
            julia-version: '1'
            julia-arch: x86
          - os: ubuntu-24.04-arm
            julia-version: '1'
            julia-arch: aarch64
          # macOS-aarch64 x ['lts', '1', 'nightly']
          - os: macos-latest
            julia-version: 'lts'
            julia-arch: aarch64
          - os: macos-latest
            julia-version: '1'
            julia-arch: aarch64
          - os: macos-latest
            julia-version: 'nightly'
            julia-arch: aarch64

    steps:
      - uses: actions/checkout@v6
      - name: "Set up Julia"
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # required
          fail_ci_if_error: true
          files: lcov.info
